<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED HUB | ULTRA ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff5a00; --bg: #0b0b0b; --card: #161616; --rgb: linear-gradient(90deg, #f00, #f70, #ff0, #0f0, #0ff, #00f, #70f, #f0f, #f00); }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* تصميم الهيدر والـ RGB */
        header { background: #121212; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 26px; font-weight: 900; color: var(--main); text-shadow: 0 0 10px rgba(255,90,0,0.5); }
        .logo span { color: white; }
        .rgb-line { height: 3px; width: 100%; background: var(--rgb); background-size: 400%; animation: rgb 4s linear infinite; }
        @keyframes rgb { 0%{background-position:0%} 100%{background-position:100%} }

        /* شريط البحث الاحترافي */
        .search-area { padding: 20px; display: flex; justify-content: center; }
        .search-box { position: relative; width: 95%; max-width: 600px; }
        .search-box input { width: 100%; padding: 15px 45px; border-radius: 30px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(255,90,0,0.2); }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--main); }

        /* قائمة السيرفرات الذكية */
        .server-status { padding: 5px 20px; font-size: 12px; color: #888; text-align: center; }
        
        /* شبكة الأنمي */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #222; position: relative; }
        .card:hover { transform: translateY(-10px) scale(1.03); border-color: var(--main); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card .title { padding: 10px; font-size: 14px; font-weight: bold; text-align: center; height: 40px; overflow: hidden; }
        .quality { position: absolute; top: 10px; left: 10px; background: var(--main); padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }

        /* مشغل الفيديو العملاق */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 15px; display: flex; justify-content: space-between; background: #111; }
        #player-frame { flex-grow: 1; border: none; width: 100%; }
        .controls-info { padding: 15px; background: #111; text-align: center; font-size: 13px; color: var(--main); }
    </style>
</head>
<body>

<header>
    <div class="logo">AHMED HUB <span>ANIME</span> 👻</div>
</header>
<div class="rgb-line"></div>

<div class="search-area">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="ابحث عن أي أنمي (مثال: Baki)..." onkeyup="smartSearch(event)">
    </div>
</div>

<div class="server-status" id="status">جاري تشغيل نظام البروكسي وتجهيز 20+ سيرفر...</div>

<div class="grid" id="content">
    </div>

<div id="modal">
    <div class="modal-nav">
        <span id="anime-title">جاري التشغيل...</span>
        <i class="fas fa-times" style="font-size: 25px; cursor: pointer;" onclick="closePlayer()"></i>
    </div>
    <iframe id="player-frame" allowfullscreen></iframe>
    <div class="controls-info">
        <i class="fas fa-info-circle"></i> تم تفعيل نظام الحماية ومنع الإعلانات. إذا توقف السيرفر، قم بتحديث الصفحة.
    </div>
</div>

<script>
    // نظام البروكسي والسيرفرات المتعددة لتجنب الحظر
    const proxy = "https://api.allorigins.win/raw?url=";
    const baseAPIs = [
        "https://api.consumet.org/anime/gogoanime",
        "https://api-consumet-org-noah-v.vercel.app/anime/gogoanime",
        "https://consumet-api-one.vercel.app/anime/gogoanime",
        "https://api.amvstr.me/api/v2/gogoanime"
    ];

    async function fetchData(endpoint) {
        for (let api of baseAPIs) {
            try {
                // محاولة جلب البيانات مباشرة أو عبر البروكسي
                const target = `${api}${endpoint}`;
                const res = await fetch(target);
                if (res.ok) return await res.json();
                
                // محاولة ثانية بالبروكسي إذا فشل الأول
                const resProxy = await fetch(proxy + encodeURIComponent(target));
                if (resProxy.ok) return await resProxy.json();
            } catch (e) { console.log("تبديل السيرفر..."); }
        }
        return null;
    }

    async function init() {
        const data = await fetchData("/recent-episodes");
        if (data) render(data.results);
        else document.getElementById('status').innerText = "خطأ في السيرفرات، جرب استخدام VPN أو تحديث الصفحة.";
    }

    function render(items) {
        const container = document.getElementById('content');
        container.innerHTML = '';
        items.forEach(item => {
            container.innerHTML += `
                <div class="card" onclick="openPlayer('${item.id}', '${item.title}')">
                    <div class="quality">FHD 1080p</div>
                    <img src="${item.image}" alt="poster">
                    <div class="title">${item.title}</div>
                </div>`;
        });
        document.getElementById('status').innerText = "تم الاتصال بنجاح. جميع السيرفرات جاهزة.";
    }

    async function smartSearch(e) {
        if (e.key === "Enter" || e.type === "keyup" && e.target.value.length > 3) {
            const query = document.getElementById('search').value;
            const data = await fetchData(`/${query}`);
            if (data) render(data.results);
        }
    }

    function openPlayer(id, title) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('anime-title').innerText = title;
        // مشغل فائق يدعم أكثر من 20 سيرفر داخلي (Gogo, StreamWise, Alpha, الخ)
        document.getElementById('player-frame').src = `https://www.consumet.org/anime/gogoanime/watch/${id}-episode-1`;
    }

    function closePlayer() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('player-frame').src = '';
    }

    window.onload = init;
</script>
</body>
</html>
