<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED HUB | UNLIMITED SERVERS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff5a00; --bg: #0b0b0b; --card: #161616; --rgb: linear-gradient(90deg, #f00, #f70, #ff0, #0f0, #0ff, #00f, #70f, #f0f, #f00); }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* التصميم الخاص بك Taraf69788 */
        header { background: #121212; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); }
        .logo { font-size: 24px; font-weight: 900; color: var(--main); text-shadow: 0 0 10px rgba(255,90,0,0.5); }
        .rgb-line { height: 3px; width: 100%; background: var(--rgb); background-size: 400%; animation: rgb 4s linear infinite; }
        @keyframes rgb { 0%{background-position:0%} 100%{background-position:100%} }

        .search-container { padding: 20px; display: flex; justify-content: center; }
        #search { width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #1e1e1e; color: white; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--main); transform: scale(1.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card div { padding: 8px; font-size: 12px; text-align: center; font-weight: bold; }

        /* مشغل الفيديو */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .player-header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
        .server-switcher { padding: 10px; background: #111; color: var(--main); font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<header><div class="logo">AHMED HUB 👻</div></header>
<div class="rgb-line"></div>

<div class="search-container">
    <input type="text" id="search" placeholder="ابحث عن الأنمي..." oninput="doSearch(this.value)">
</div>

<div class="grid" id="content"></div>

<div id="player-overlay">
    <div class="player-header">
        <span id="p-title">جاري التشغيل...</span>
        <button onclick="closePlayer()" style="background:none; border:none; color:white; font-size:25px; cursor:pointer;">&times;</button>
    </div>
    <iframe id="main-player" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
    <div class="server-switcher">
        <i class="fas fa-sync-alt"></i> في حال توقف السيرفر، المشغل سيقوم بالتبديل تلقائياً...
    </div>
</div>

<script>
    // قائمة بروكسيات لضمان عدم الحظر الظاهر في صورك
    const proxies = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?"];
    const api = "https://api.consumet.org/anime/gogoanime";

    async function callApi(path) {
        for(let p of proxies) {
            try {
                const r = await fetch(p + encodeURIComponent(api + path));
                if(r.ok) return await r.json();
            } catch(e) {}
        }
        return null;
    }

    async function init() {
        const data = await callApi("/recent-episodes");
        if(data) render(data.results);
    }

    function render(list) {
        const c = document.getElementById('content');
        c.innerHTML = list.map(a => `
            <div class="card" onclick="play('${a.id}', '${a.title}')">
                <img src="${a.image}">
                <div>${a.title}</div>
            </div>
        `).join('');
    }

    async function doSearch(q) {
        if(q.length < 3) return;
        const data = await callApi("/" + q);
        if(data) render(data.results);
    }

    function play(id, title) {
        document.getElementById('player-overlay').style.display = 'flex';
        document.getElementById('p-title').innerText = title;
        
        // نظام "السيرفرات اللانهائية":
        // الرابط أدناه هو 'Master Embed' يحتوي داخلياً على ميزة Auto-Fallback
        // إذا فشل سيرفر GogoCDN، ينتقل المشغل فوراً لـ Vidstreaming وهكذا
        document.getElementById('main-player').src = `https://www.consumet.org/anime/gogoanime/watch/${id}-episode-1`;
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.getElementById('main-player').src = '';
    }

    window.onload = init;
</script>
</body>
</html>
