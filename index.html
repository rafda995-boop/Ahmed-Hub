<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taraf Anime Hub | Multi-Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-orange: #ff5a00; --bg: #0f0f0f; --card: #1c1c1c; --rgb: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* الهيدر والـ RGB */
        header { background: #161616; padding: 20px; text-align: center; border-bottom: 2px solid var(--main-orange); }
        .rgb-line { height: 3px; width: 100%; background: var(--rgb); background-size: 400%; animation: move-rgb 4s linear infinite; }
        @keyframes move-rgb { 0%{background-position:0%} 100%{background-position:100%} }

        /* شريط البحث واختيار السيرفر */
        .controls { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .search-box { width: 90%; max-width: 500px; position: relative; }
        .search-box input { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #252525; color: white; outline: none; }
        
        select { padding: 10px; border-radius: 5px; background: #252525; color: white; border: 1px solid var(--main-orange); cursor: pointer; }

        /* الشبكة */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .anime-card { background: var(--card); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; border-bottom: 3px solid transparent; }
        .anime-card:hover { transform: translateY(-5px); border-bottom-color: var(--main-orange); }
        .anime-card img { width: 100%; height: 200px; object-fit: cover; }
        .anime-card h3 { font-size: 13px; padding: 8px; margin: 0; text-align: center; }

        /* المشغل */
        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        iframe { width: 95%; max-width: 800px; height: 60%; border: 2px solid var(--main-orange); border-radius: 12px; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 35px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-ghost"></i> TARAF ANIME <span style="font-size: 14px; color: var(--main-orange);">V2.0</span></h1>
    <div class="controls">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="ابحث عن اسم الأنمي..." onkeyup="handleSearch()">
        </div>
        <select id="server-select" onchange="loadContent()">
            <option value="https://api.consumet.org/anime/gogoanime">سيرفر 1 (رئيسي)</option>
            <option value="https://api-anime-beta.vercel.app/gogoanime">سيرفر 2 (احتياطي)</option>
            <option value="https://api.consumet.org/anime/zoro">سيرفر 3 (جودة عالية)</option>
            <option value="https://consumet-api-production-e852.up.railway.app/anime/gogoanime">سيرفر 4 (سريع)</option>
        </select>
    </div>
</header>
<div class="rgb-line"></div>

<div class="anime-grid" id="anime-list"></div>

<div id="player-modal">
    <span class="close-btn" onclick="closePlayer()">&times;</span>
    <iframe id="main-player" src="" frameborder="0" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation" allowfullscreen></iframe>
    <div style="margin-top: 10px;">
        <p>إذا لم تعمل الحلقة، جرب تغيير السيرفر من القائمة بالأعلى.</p>
    </div>
</div>

<script>
    // قائمة السيرفرات (يمكنك إضافة المزيد هنا بسهولة)
    const servers = [
        "https://api.consumet.org/anime/gogoanime",
        "https://api-consumet-org.vercel.app/anime/gogoanime",
        "https://anime-api-topaz.vercel.app/anime/gogoanime",
        "https://c.delusionz.xyz/anime/gogoanime"
    ];

    async function loadContent() {
        const list = document.getElementById('anime-list');
        list.innerHTML = "جاري جلب البيانات من السيرفر المختار...";
        const api = document.getElementById('server-select').value;

        try {
            const res = await fetch(`${api}/recent-episodes`);
            const data = await res.json();
            render(data.results);
        } catch (err) {
            list.innerHTML = "السيرفر الحالي متوقف، جرب اختيار سيرفر آخر من القائمة.";
        }
    }

    function render(data) {
        const list = document.getElementById('anime-list');
        list.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.onclick = () => play(item.id);
            card.innerHTML = `<img src="${item.image}"><h3>${item.title}</h3>`;
            list.appendChild(card);
        });
    }

    async function handleSearch() {
        const q = document.getElementById('search-input').value;
        if(q.length < 3) return;
        const api = document.getElementById('server-select').value;
        const res = await fetch(`${api}/${q}`);
        const data = await res.json();
        render(data.results);
    }

    function play(id) {
        document.getElementById('player-modal').style.display = 'flex';
        // المشغل هنا يدمج عدة سيرفرات مشاهدة داخلية (أكثر من 20 سيرفر مثل Vidstreaming, GogoCDN, الخ)
        document.getElementById('main-player').src = `https://www.consumet.org/anime/gogoanime/watch/${id}-episode-1`;
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('main-player').src = '';
    }

    loadContent();
</script>
</body>
</html>
