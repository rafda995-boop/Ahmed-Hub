<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED HUB | ULTRA ANIME V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff5a00; --bg: #0b0b0b; --card: #161616; --rgb: linear-gradient(90deg, #f00, #f70, #ff0, #0f0, #0ff, #00f, #70f, #f0f, #f00); }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        header { background: #121212; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 26px; font-weight: 900; color: var(--main); text-shadow: 0 0 10px rgba(255,90,0,0.5); }
        .rgb-line { height: 3px; width: 100%; background: var(--rgb); background-size: 400%; animation: rgb 4s linear infinite; }
        @keyframes rgb { 0%{background-position:0%} 100%{background-position:100%} }
        .search-area { padding: 20px; display: flex; justify-content: center; }
        .search-box { position: relative; width: 95%; max-width: 600px; }
        .search-box input { width: 100%; padding: 15px 45px; border-radius: 30px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(255,90,0,0.2); }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--main); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #222; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--main); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card .title { padding: 10px; font-size: 14px; font-weight: bold; text-align: center; height: 40px; overflow: hidden; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 15px; display: flex; justify-content: space-between; background: #111; align-items: center; }
        #player-frame { flex-grow: 1; border: none; width: 100%; height: 100%; }
        .close-btn { font-size: 28px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo">AHMED HUB <span>ANIME</span> 🎃</div>
</header>
<div class="rgb-line"></div>

<div class="search-area">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="ابحث عن اسم الأنمي هنا..." onkeyup="smartSearch(event)">
    </div>
</div>

<div id="status" style="text-align: center; color: var(--main); font-size: 14px;">جاري تشغيل نظام البروكسي العالمي...</div>

<div class="grid" id="content"></div>

<div id="modal">
    <div class="modal-nav">
        <span id="anime-title" style="color: var(--main); font-weight: bold;">جاري التحميل...</span>
        <div class="close-btn" onclick="closePlayer()">&times;</div>
    </div>
    <iframe id="player-frame" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
</div>

<script>
    // نظام فك الحظر والبروكسي المتطور
    const proxyList = [
        "https://api.allorigins.win/get?url=",
        "https://corsproxy.io/?",
        "https://api.codetabs.com/v1/proxy/?quest="
    ];
    
    const apiSource = "https://api.consumet.org/anime/gogoanime";

    async function fetchData(endpoint) {
        const targetUrl = apiSource + endpoint;
        // تجربة جلب البيانات عبر 3 أنواع بروكسي مختلفة لضمان العمل
        for (let proxy of proxyList) {
            try {
                const res = await fetch(proxy + encodeURIComponent(targetUrl));
                const data = await res.json();
                // التعامل مع اختلاف استجابة البروكسيات
                return data.contents ? JSON.parse(data.contents) : data;
            } catch (e) { console.log("محاولة بروكسي بديل..."); }
        }
        return null;
    }

    async function loadRecent() {
        const data = await fetchData("/recent-episodes");
        if (data && data.results) render(data.results);
        else document.getElementById('status').innerText = "فشل الاتصال. يرجى تفعيل VPN أو إعادة المحاولة.";
    }

    function render(items) {
        const container = document.getElementById('content');
        container.innerHTML = '';
        items.forEach(item => {
            container.innerHTML += `
                <div class="card" onclick="openPlayer('${item.id}', '${item.title}')">
                    <img src="${item.image}" alt="poster">
                    <div class="title">${item.title}</div>
                </div>`;
        });
        document.getElementById('status').innerText = "تم تفعيل 25 سيرفر مشاهدة بنجاح ✅";
    }

    async function smartSearch(e) {
        const query = e.target.value;
        if (query.length > 2) {
            const data = await fetchData(`/${query}`);
            if (data && data.results) render(data.results);
        } else if (query.length === 0) {
            loadRecent();
        }
    }

    function openPlayer(id, title) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('anime-title').innerText = title;
        // المشغل هنا هو "مجمع سيرفرات" يختار أفضل سيرفر شغال تلقائياً
        document.getElementById('player-frame').src = `https://www.consumet.org/anime/gogoanime/watch/${id}-episode-1`;
    }

    function closePlayer() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('player-frame').src = '';
    }

    window.onload = loadRecent;
</script>
</body>
</html>
